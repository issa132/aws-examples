tasks:

  - name: utils
    before: |
      sudo apt-get install tree
      #https://builder.aws.com/build/tools

  - name: ruby
    before: |
      sudo apt update
      sudo apt install ruby-full
      sudo gem install bundler

  - name:  marven
    before: |
      #https://maven.apache.org/guides/getting-started/maven-in-five-minutes.html
      sudo apt-get update
      sudo apt-get install -y maven



  - name: java
    before: |
      sudo apt update
      sudo apt install default-jre
      sudo apt install default-jdk
      #sudo apt install openjdk-21-jdk


  - name: aws-cli
    env:
      AWS_CLI_AUTO_PROMPT: on-partial
    before: |
      #https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html
      curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      unzip awscliv2.zip
      rm -rf awscliv2.zip aws
      sudo ./aws/install
      aws --version

  - name: powershell
    before: |  
      ##################################
      # https://docs.aws.amazon.com/powershell/
      # https://docs.aws.amazon.com/powershell/v5/reference/items/pstoolsref-welcome.html
      # https://techcommunity.microsoft.com/blog/itopstalkblog/autocomplete-in-powershell/2604524
      # https://learn.microsoft.com/en-us/powershell/scripting/install/install-ubuntu?view=powershell-7.4
      # https://docs.aws.amazon.com/powershell/v5/userguide/pstools-getting-set-up-windows.html 
      # https://docs.aws.amazon.com/powershell/v5/userguide/ps-installing-awstools.html

      # Prerequisites

      # Update the list of packages
      sudo apt-get update

      # Install pre-requisite packages
      sudo apt-get install -y wget apt-transport-https software-properties-common

      # Get the version of Ubuntu
      source /etc/os-release

      # Download the Microsoft repository keys
      #wget -q https://packages.microsoft.com/config/ubuntu/$VERSION_ID/packages-microsoft-prod.deb
      source /etc/os-release
      echo $VERSION_ID

      wget -q https://packages.microsoft.com/config/ubuntu/$VERSION_ID/packages-microsoft-prod.deb

      

      # Register the Microsoft repository keys
      sudo dpkg -i packages-microsoft-prod.deb

      # Delete the Microsoft repository keys file
      rm packages-microsoft-prod.deb

      # Update the list of packages after we added packages.microsoft.com
      sudo apt-get update

      ##################################
      # Install PowerShell
      sudo apt-get install -y powershell
      

      # Start PowerShell
      #pwsh
      #Install-Module -Name AWS.Tools.Installer
      #Install-AWSToolsModule AWS.Tools.EC2,AWS.Tools.S3 -CleanUp
      #Install-AWSToolsModule AWS.Tools.S3 -CleanUp
      #Set-PSReadlineKeyHandler -Key Tab -Function MenuComplete
